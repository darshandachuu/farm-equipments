{% extends "base.html" %}
{% block title %}Add Equipment - FarmRent{% endblock %}
{% block content %}
<div class="d-flex" id="wrapper">
    {% include 'includes/owner_sidebar.html' %}
    <div id="page-content-wrapper" class="w-100">
        <div class="container-fluid p-4">
            {% block dashboard_content %}
            <h3 class="fw-bold mb-4"><i class="bi bi-plus-circle me-2"></i>Add Equipment</h3>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Equipment Name *</label>
                                <input type="text" class="form-control" name="name" required placeholder="e.g. John Deere 5050D">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category *</label>
                                <select class="form-select" name="category" required>
                                    <option value="">Select Category</option>
                                    {% for cat in categories %}
                                    <option value="{{ cat }}">{{ cat }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" name="description" rows="3" placeholder="Describe your equipment..."></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Brand</label>
                                <input type="text" class="form-control" name="brand" placeholder="e.g. Mahindra">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Model</label>
                                <input type="text" class="form-control" name="model" placeholder="e.g. 575 DI">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Year</label>
                                <input type="number" class="form-control" name="year" min="1990" max="2026" placeholder="e.g. 2022">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Condition</label>
                                <select class="form-select" name="condition">
                                    <option value="Excellent">Excellent</option>
                                    <option value="Good" selected>Good</option>
                                    <option value="Fair">Fair</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Location</label>
                                <input type="text" class="form-control" name="location" placeholder="e.g. Pune, Maharashtra">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Equipment Image</label>
                                <input type="file" class="form-control" name="image" accept="image/*">
                            </div>
                            <div class="col-12"><hr></div>
                            <div class="col-md-4">
                                <label class="form-label">Daily Rate (₹) *</label>
                                <input type="number" class="form-control" name="daily_rate" step="0.01" min="1" required placeholder="e.g. 1500">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Weekly Rate (₹)</label>
                                <input type="number" class="form-control" name="weekly_rate" step="0.01" min="0" placeholder="e.g. 8000">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Monthly Rate (₹)</label>
                                <input type="number" class="form-control" name="monthly_rate" step="0.01" min="0" placeholder="e.g. 25000">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Security Deposit (₹)</label>
                                <input type="number" class="form-control" name="security_deposit" step="0.01" min="0" placeholder="e.g. 5000">
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success px-4 py-2 fw-semibold">
                                <i class="bi bi-check-lg me-1"></i>Add Equipment
                            </button>
                            <a href="{{ url_for('owner.my_equipment') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
            {% endblock %}
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>document.getElementById('toggle-sidebar')?.addEventListener('click', function() { document.getElementById('sidebar').classList.toggle('show'); });</script>
{% endblock %}
