{% extends "base.html" %}
{% block title %}Forgot Password - FarmRent{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-success" style="font-size:3rem"></i>
                        <h3 class="mt-2 fw-bold">Forgot Password?</h3>
                        <p class="text-muted">Enter your email to receive a reset link</p>
                    </div>
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-4">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" name="email" required placeholder="you@example.com">
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                            <i class="bi bi-send me-2"></i>Send Reset Link
                        </button>
                    </form>
                    <hr class="my-4">
                    <p class="text-center mb-0"><a href="{{ url_for('auth.login') }}" class="text-success fw-semibold"><i class="bi bi-arrow-left me-1"></i>Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
